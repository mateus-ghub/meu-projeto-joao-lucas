<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <title>Busca de Músicas</title>

</head>
<body>

<header>
    <h1>🎵 Buscador de Músicas</h1>

    <div id="results"></div>
</main>

<footer>
    <p>Projeto desenvolvido por <strong>João Lucas</strong></p>
    <p>Busca de músicas com interação simples e rápida via API.</p>
</footer>

<script src="script.js"></script>

</html>
